version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: chat-postgres
    restart: always
    environment:
      POSTGRES_USER: rishabh
      POSTGRES_PASSWORD: chatappPassword
      POSTGRES_DB: chatapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: chat-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: chat-redis
    restart: always
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: chat-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chat-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    restart: always
    ports:
      - "4001:4001"
      - "5555:5555" 
    environment:
      PORT: 4001
      JWT_SECRET: ScretkeyforJWT
      POSTGRES_HOST: postgres
      MONGO_HOST: mongodb
      REDIS_HOST: redis
      KAFKA_BROKER: kafka:9092
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - postgres
      - mongodb
      - redis
      - kafka

volumes:
  postgres_data:
  mongo_data: